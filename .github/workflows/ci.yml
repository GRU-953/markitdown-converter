name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytesseract Pillow

      - name: Syntax check (all Python files)
        run: |
          python -m py_compile bijoy_unicode.py
          python -m py_compile ocr_engine.py
          python -m py_compile settings.py
          python -m py_compile pipeline.py
          python -m py_compile app.py

      - name: Run tests with coverage
        run: >-
          pytest tests/ -v --tb=short
          --cov=bijoy_unicode --cov=ocr_engine --cov=settings --cov=pipeline
          --cov-report=term-missing
