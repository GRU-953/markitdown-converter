name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    name: Build and release
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. v4.6.0
          $ver = $tag.TrimStart("v")                 # e.g. 4.6.0
          # Update APP_VERSION in app.py
          (Get-Content app.py) -replace 'APP_VERSION = "v[^"]*"', "APP_VERSION = `"$tag`"" |
            Set-Content app.py
          # Update version fields in installer.iss
          (Get-Content installer.iss) -replace 'AppVersion=[\d.]+', "AppVersion=$ver" |
            Set-Content installer.iss
          (Get-Content installer.iss) -replace 'VersionInfoVersion=[\d.]+', "VersionInfoVersion=$ver" |
            Set-Content installer.iss
          Write-Output "Version set to $tag ($ver)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Install Tesseract OCR
        run: choco install tesseract -y --no-progress

      - name: Download Bengali tessdata
        shell: pwsh
        run: |
          $dest = "C:\Program Files\Tesseract-OCR\tessdata\ben.traineddata"
          Invoke-WebRequest `
            -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/ben.traineddata" `
            -OutFile $dest

      - name: Verify Tesseract install
        shell: pwsh
        run: |
          $exe  = "C:\Program Files\Tesseract-OCR\tesseract.exe"
          $eng  = "C:\Program Files\Tesseract-OCR\tessdata\eng.traineddata"
          $ben  = "C:\Program Files\Tesseract-OCR\tessdata\ben.traineddata"
          foreach ($f in $exe, $eng, $ben) {
            if (-not (Test-Path $f)) { throw "Missing: $f" }
            Write-Output "OK  $f"
          }

      - name: Convert icon PNG to ICO
        run: >-
          python -c
          "from PIL import Image;
          img=Image.open('assets/app_icon.png');
          img.save('assets/app_icon.ico',format='ICO',sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          $TESS = "C:\Program Files\Tesseract-OCR"
          python -m PyInstaller --noconfirm --onefile --windowed `
            --name "GRU953Markdown" `
            --icon "assets/app_icon.ico" `
            --add-data "web;web" `
            --add-data "assets;assets" `
            --add-data "locales;locales" `
            "--add-binary=$TESS\tesseract.exe;tesseract" `
            "--add-data=$TESS\tessdata\eng.traineddata;tesseract/tessdata" `
            "--add-data=$TESS\tessdata\ben.traineddata;tesseract/tessdata" `
            --collect-all webview `
            --collect-all clr_loader `
            --collect-all magika `
            --collect-all markitdown `
            --collect-all pymupdf `
            --hidden-import clr `
            --hidden-import bottle `
            --hidden-import markdown `
            --hidden-import pytesseract `
            --hidden-import mammoth `
            --hidden-import openpyxl `
            --hidden-import pptx `
            --hidden-import xlrd `
            --hidden-import pdfminer `
            --hidden-import olefile `
            --hidden-import striprtf `
            app.py

      - name: Verify exe
        shell: pwsh
        run: |
          $exe = "dist\GRU953Markdown.exe"
          if (-not (Test-Path $exe)) { throw "Build failed: exe not found" }
          $mb = [Math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Output "Built: GRU953Markdown.exe ($mb MB)"

      - name: Create PDF smoke-test fixture
        shell: pwsh
        run: |
          python -c "import pymupdf; doc=pymupdf.open(); p=doc.new_page(); p.insert_text((50,100),'GRU953 Markdown smoke test',fontsize=14); doc.save('tests/fixtures/sample.pdf'); doc.close(); print('Created sample.pdf')"

      - name: Smoke-test bundled converters
        shell: pwsh
        run: |
          # Test Word document (MarkItDown + mammoth)
          .\dist\GRU953Markdown.exe --selftest "tests/fixtures/sample.docx" > selftest_docx.txt 2>&1
          $out = Get-Content selftest_docx.txt -Raw
          Write-Output "DOCX: $out"
          if ($out -notmatch "SELFTEST_OK") {
            throw "Bundled exe failed to convert sample.docx — a format dependency is missing."
          }
          # Test PDF (MarkItDown pdfminer text-layer path)
          .\dist\GRU953Markdown.exe --selftest "tests/fixtures/sample.pdf" > selftest_pdf.txt 2>&1
          $out2 = Get-Content selftest_pdf.txt -Raw
          Write-Output "PDF:  $out2"
          if ($out2 -notmatch "SELFTEST_OK") {
            throw "Bundled exe failed to convert sample.pdf — pdfminer or pymupdf is missing from the build."
          }

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if (-not (Test-Path "dist\GRU953Markdown-Setup.exe")) {
            throw "Inno Setup build failed: installer not found"
          }
          $mb = [Math]::Round((Get-Item "dist\GRU953Markdown-Setup.exe").Length / 1MB, 1)
          Write-Output "Built: GRU953Markdown-Setup.exe ($mb MB)"

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $files = @("dist\GRU953Markdown.exe", "dist\GRU953Markdown-Setup.exe")
          $lines = $files | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            "$hash  $(Split-Path $_ -Leaf)"
          }
          $lines | Out-File -FilePath "dist\SHA256SUMS.txt" -Encoding utf8
          Get-Content "dist\SHA256SUMS.txt"

      - name: Attest build provenance (installer)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/GRU953Markdown-Setup.exe

      - name: Attest build provenance (portable exe)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/GRU953Markdown.exe

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GRU953Markdown-Setup.exe
            dist/GRU953Markdown.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
